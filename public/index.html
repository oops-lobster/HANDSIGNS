<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>수어잇다</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <header class="topbar">
          <div class="brand">
            <img src="mark.svg" alt="" class="brandMark">
            <div>
              <p class="eyebrow">한국어를 수어 영상으로</p>
              <h1>수어잇다</h1>
              <p class="tagline">농아인과 청인이 더 쉽게 만나는 수어 영상 변환 프로토타입</p>
            </div>
          </div>
          <div class="status" id="status">준비됨</div>
        </header>

        <form class="composer" id="translateForm">
          <div class="composerHeader">
            <label for="textInput">전달하고 싶은 문장</label>
            <span>문장 분석 → 수어 순서 → 영상 재생</span>
          </div>
          <div class="inputRow">
            <div class="speechInput">
              <textarea id="textInput" name="text" rows="4" placeholder="예: 안녕하세요 반갑습니다"></textarea>
              <div class="speechTools">
                <button type="button" id="speechButton" class="speechButton">음성 입력</button>
                <span id="speechStatus">마이크로 말하면 문장으로 입력됩니다.</span>
              </div>
            </div>
            <button type="submit" class="submitButton">수어로 보기</button>
          </div>
        </form>

        <section class="player" aria-label="수어 결과">
          <div class="stage">
            <div class="preview" id="preview">
              <div class="emptyState">
                <strong>말을 수어의 흐름으로 바꿔 보여줍니다.</strong>
                <span>문장을 수어 표현 단위로 정리하고, 국립수어사전의 정보에서 찾아 순서대로 재생합니다.</span>
              </div>
            </div>
            <div class="controls" aria-label="재생 제어">
              <button type="button" id="prevButton">이전</button>
              <button type="button" id="playButton">재생</button>
              <button type="button" id="nextButton">다음</button>
            </div>
          </div>
          <aside class="queue">
            <div class="queueHeader">
              <strong>수어 재생 순서</strong>
              <span id="queueCount">0개</span>
            </div>
            <ol class="timeline" id="timeline"></ol>
            <section class="plannerPanel" aria-label="KSL 변환 순서">
              <div class="queueHeader">
                <strong>수어 문장 구조</strong>
                <span id="plannerSource">대기</span>
              </div>
              <div class="tokenList" id="plannerTokens">
                <span>문장을 입력하면 표시됩니다.</span>
              </div>
            </section>
          </aside>
        </section>

        <footer class="creatorBar" aria-label="프로젝트 정보">
          <div>
            <span>made by</span>
            <strong>raymin</strong>
          </div>
          <nav aria-label="관련 링크">
            <a href="about.html" target="_blank" rel="noreferrer">왜 이걸 만들었나요?</a>
            <a href="https://docs.google.com/document/d/1h4UrcmYzHf04h_NRk8UPjXEwhReKq4DQSA4WncuUZ7k/edit?usp=sharing" target="_blank" rel="noreferrer">만든 사람 소개</a>
          </nav>
        </footer>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
