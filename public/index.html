<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HANDSIGNS</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Korean Text to Sign</p>
            <h1>HANDSIGNS</h1>
          </div>
          <div class="status" id="status">준비됨</div>
        </header>

        <form class="composer" id="translateForm">
          <label for="textInput">한국어 문장</label>
          <div class="inputRow">
            <textarea id="textInput" name="text" rows="4" placeholder="예: 안녕하세요 감사합니다"></textarea>
            <button type="submit">변환</button>
          </div>
        </form>

        <section class="player" aria-label="수어 결과">
          <div class="preview" id="preview">
            <div class="emptyState">
              <strong>문장을 입력하면 수어 검색 결과가 여기에 표시됩니다.</strong>
              <span>각 단어를 문화포털 통합 수어 API에서 검색하는 MVP입니다.</span>
            </div>
          </div>
          <ol class="timeline" id="timeline"></ol>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
